<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Read — The Unfolding</title>
<link rel="icon" href="favicon.ico" sizes="any"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── Layout ────────────────────────────────────────────── */
.reader-wrap {
  display: grid;
  grid-template-columns: 1fr 340px;
  min-height: 100vh;
  padding-top: 64px;
}
.reader-main   { overflow-y: auto; }
.reader-sidebar {
  border-left: 1px solid var(--line);
  background: var(--ink-2);
  position: sticky;
  top: 64px;
  height: calc(100vh - 64px);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

/* ── Chapter selector ──────────────────────────────────── */
.chapter-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: 64px;
  background: rgba(6,22,25,0.97);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; gap: 20px;
}
.chapter-bar-left { display: flex; align-items: center; gap: 20px; }
.cb-logo {
  font-family: var(--serif); font-size: 1rem; letter-spacing: 0.1em;
  display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--ivory);
}
.cb-logo .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--rose); box-shadow: 0 0 10px var(--rose); }
.chapter-pills { display: flex; gap: 6px; }
.cp-btn {
  padding: 5px 14px;
  border: 1px solid var(--line);
  background: transparent; color: var(--muted);
  font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase;
  cursor: pointer; border-radius: 2px; transition: all 0.15s;
}
.cp-btn:hover { border-color: var(--rose); color: var(--rose); }
.cp-btn.active { background: var(--rose); border-color: var(--rose); color: var(--ink); }
.chapter-bar-right { display: flex; align-items: center; gap: 14px; }
.auth-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px; border: 1px solid var(--line-strong);
  background: transparent; color: var(--ivory);
  font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase;
  cursor: pointer; border-radius: 2px; transition: all 0.15s;
}
.auth-btn:hover { border-color: var(--rose); color: var(--rose); }
.auth-avatar { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; border: 1px solid var(--line-strong); }
.auth-name { font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.1em; color: var(--ivory-2); }

/* ── Font size controls ────────────────────────────────── */
.font-size-controls { display: flex; gap: 4px; align-items: center; }
.fs-btn {
  padding: 4px 10px; border: 1px solid var(--line);
  background: transparent; color: var(--muted);
  font-family: var(--mono); font-size: 0.75rem; font-weight: 500;
  cursor: pointer; border-radius: 2px; transition: all 0.15s; line-height: 1;
}
.fs-btn:hover { border-color: var(--ivory); color: var(--ivory); }

/* ── Chapter content ───────────────────────────────────── */
.chapter-content {
  max-width: 780px;
  margin: 0 auto;
  padding: 72px 56px 120px;
}
.ch-eyebrow {
  font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.3em;
  text-transform: uppercase; color: var(--rose); margin-bottom: 12px;
}
.ch-title {
  font-family: var(--serif); font-size: clamp(2rem, 3.5vw, 3rem);
  font-weight: 300; color: var(--ivory); margin-bottom: 8px; line-height: 1.1;
}
.ch-subtitle {
  font-family: var(--serif); font-style: italic; color: var(--muted);
  font-size: 1.1rem; margin-bottom: 56px;
}
.ch-divider {
  width: 48px; height: 1px; background: var(--rose); opacity: 0.5;
  margin: 48px 0;
}

/* ── Paragraphs ────────────────────────────────────────── */
.para {
  font-family: var(--serif);
  font-size: 1.18rem;
  line-height: 1.9;
  letter-spacing: 0.012em;
  color: var(--ivory);
  margin-bottom: 1.7em;
  cursor: pointer;
  border-radius: 3px;
  padding: 6px 10px;
  margin-left: -10px;
  transition: background 0.15s;
  position: relative;
}
.para:hover { background: rgba(233,74,124,0.05); }
.para.active {
  background: rgba(233,74,124,0.08);
  border-left: 2px solid var(--rose);
  padding-left: 16px;
  margin-left: -18px;
}
.para.has-comments::after {
  content: attr(data-comment-count);
  position: absolute; right: -28px; top: 8px;
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--teal); color: var(--ivory);
  font-family: var(--mono); font-size: 0.72rem;
  display: flex; align-items: center; justify-content: center;
  line-height: 1;
}

/* ── Wiki link highlights ──────────────────────────────── */
.wiki-link {
  border-bottom: 1px dotted transparent;
  color: inherit;
  cursor: default; /* not clickable until para is active */
  transition: border-color 0.15s, color 0.15s;
  pointer-events: none; /* disabled by default */
}
/* Enable and show on active paragraph */
.para.active .wiki-link {
  border-bottom-color: var(--teal-soft);
  cursor: pointer;
  pointer-events: auto;
}
.para.active .wiki-link:hover { border-bottom-color: var(--rose); color: var(--rose-soft); }
/* Show always when hints-on, but still only clickable when active */
body.wiki-hints-on .wiki-link {
  border-bottom-color: var(--teal-soft);
  opacity: 0.8;
}
body.wiki-hints-on .para.active .wiki-link {
  pointer-events: auto;
  cursor: pointer;
  opacity: 1;
}

.ch-section-head {
  font-family: var(--serif); font-weight: 300; color: var(--muted);
  font-size: 1.1rem; margin-bottom: 28px;
}
.ch-location-head {
  font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.3em;
  text-transform: uppercase; color: var(--teal-soft);
  margin: 48px 0 24px; display: flex; align-items: center; gap: 12px;
}
.ch-location-head::before {
  content: ''; display: inline-block;
  width: 24px; height: 1px; background: var(--teal-soft);
}

/* ── Uplink interlude ──────────────────────────────────── */
.uplink-block {
  margin: 56px -10px;
  padding: 20px 28px 12px;
  border-left: 2px solid var(--teal-soft);
  background: rgba(45,91,102,0.12);
  border-radius: 0 3px 3px 0;
}
.uplink-label {
  font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.3em;
  text-transform: uppercase; color: #6ecfde; margin-bottom: 10px;
  display: flex; align-items: center; gap: 10px;
}
.uplink-label::before { content: '◉'; font-size: 0.7rem; }
.uplink-label a {
  color: inherit; border-bottom: 1px dotted currentColor;
  transition: color 0.15s;
}
.uplink-label a:hover { color: var(--ivory); }

/* Uplink heading as a narratable para */
.uplink-heading-para {
  font-family: var(--mono) !important;
  font-size: 0.72rem !important;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: #6ecfde !important;
  margin-bottom: 10px !important;
  line-height: 1.4 !important;
  display: flex; align-items: center; gap: 10px;
}
.uplink-heading-para::before { content: '◉'; font-size: 0.7rem; opacity: 0.8; }
.uplink-heading-para:hover { background: rgba(74,154,170,0.06) !important; }
.uplink-heading-para.active { border-left-color: var(--teal-soft) !important; background: rgba(74,154,170,0.1) !important; }

/* Uplink paras are full .para elements — styles live there.
   These rules only add the mono font override and teal tint. */
.uplink-block .para {
  font-family: var(--mono);
  font-size: 0.85rem;
  line-height: 1.75;
  color: #b8d8de;
  letter-spacing: 0.02em;
  margin-bottom: 4px;
}
.uplink-block .para:hover  { background: rgba(74,154,170,0.08); }
.uplink-block .para.active {
  background: rgba(74,154,170,0.14);
  border-left-color: var(--teal-soft);
}

/* Assets variant — each entry on its own line, section headers as dividers */
.uplink-assets .para {
  font-family: var(--serif);
  font-size: 0.95rem;
  line-height: 1.6;
  color: var(--ivory-2);
  letter-spacing: 0.01em;
  margin-bottom: 2px;
  padding: 5px 10px 5px 24px;
}
.uplink-section-divider {
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: #6ecfde;
  padding: 18px 10px 6px;
  margin-top: 10px;
  border-top: 1px solid rgba(74,154,170,0.25);
}
.uplink-section-divider:first-child { border-top: none; padding-top: 4px; margin-top: 0; }
.uplink-section-divider strong { font-weight: 600; }

/* Level 1: SOL SYSTEM, YREUS SYSTEM, MAIREE — prominent */
.uplink-s1 {
  font-size: 0.68rem;
  letter-spacing: 0.32em;
  color: var(--ivory);
  border-top-color: rgba(74,154,170,0.45);
  padding-top: 22px;
  margin-top: 16px;
}
.uplink-s1:first-child { border-top: none; padding-top: 4px; margin-top: 0; }

/* Level 2: En Route, In Orbit, The Landed — indented sub-headers */
.uplink-s2 {
  font-size: 0.6rem;
  letter-spacing: 0.22em;
  color: var(--teal-soft);
  border-top: none;
  padding: 14px 10px 4px 24px;
  margin-top: 4px;
}

/* ── Scene break ───────────────────────────────────────── */
.scene-break {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  margin: 64px 0;
  opacity: 0.45;
}
.scene-break span {
  color: var(--rose);
  font-size: 0.7rem;
  letter-spacing: 0.1em;
}

/* ── Epigraph ──────────────────────────────────────────── */
.epigraph-block {
  margin: 0 0 56px;
  padding: 28px 32px;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
/* .para.epigraph-para inherits all .para interactivity;
   these rules only override the visual treatment */
.epigraph-block .para {
  font-style: italic;
  color: var(--ivory-2);
  margin-bottom: 0.8em;
}
.epigraph-block .para:last-child { margin-bottom: 0; }
.epigraph-block .para:hover { background: rgba(233,74,124,0.04); }
.para.drop-cap::first-letter {
  font-family: var(--serif);
  font-size: 4.2em; float: left; line-height: 0.82;
  padding: 0.1em 0.1em 0 0; color: var(--rose); font-weight: 500;
}

/* ── Paragraph toolbar ─────────────────────────────────── */
.para-toolbar {
  display: none;
  position: absolute; right: 0; top: -36px;
  background: var(--ink-2); border: 1px solid var(--line-strong);
  border-radius: 3px; padding: 4px;
  gap: 2px; z-index: 10;
}
.para.active .para-toolbar { display: flex; }
.pt-btn {
  padding: 5px 10px;
  background: transparent; border: none; color: var(--muted);
  font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer; border-radius: 2px; transition: all 0.12s; white-space: nowrap;
}
.pt-btn:hover { background: rgba(233,74,124,0.12); color: var(--rose); }
.pt-btn.pt-narrate { border-color: rgba(233,74,124,0.3); color: var(--rose-soft); }
.pt-btn.pt-narrate:hover { background: rgba(233,74,124,0.18); color: var(--rose); }

/* ── Sidebar panels ────────────────────────────────────── */
.sb-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; opacity: 0.35; padding: 32px;
  font-family: var(--serif); font-style: italic;
  font-size: 1rem; color: var(--muted); text-align: center;
}
.sb-empty svg { opacity: 0.4; }

.sb-panel { display: none; flex-direction: column; height: 100%; }
.sb-panel.visible { display: flex; }

.sb-head {
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
}
.sb-head-left { flex: 1; min-width: 0; }
.sb-para-preview {
  font-family: var(--serif); font-style: italic; font-size: 1rem;
  color: var(--muted); line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; margin-top: 4px;
}
.sb-close {
  background: transparent; border: none; color: var(--muted);
  font-size: 1.2rem; cursor: pointer; padding: 2px 6px; flex-shrink: 0;
  transition: color 0.15s;
}
.sb-close:hover { color: var(--ivory); }

/* Comments list */
.comments-list {
  flex: 1; overflow-y: auto; padding: 16px 20px;
  display: flex; flex-direction: column; gap: 14px;
}
.comment-item {
  background: rgba(6,22,25,0.5); border: 1px solid var(--line);
  border-radius: 4px; padding: 14px 16px;
  animation: fadeUp 0.2s ease both;
}
@keyframes fadeUp { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform:none; } }
.comment-head {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.c-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: var(--teal); }
.c-name { font-family: var(--mono); font-size: 0.82rem; letter-spacing: 0.08em; color: var(--ivory); font-weight: 500; }
.c-time { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); margin-left: auto; }
.c-body { font-family: var(--serif); font-size: 1.05rem; color: var(--ivory-2); line-height: 1.65; }
.c-delete { background: transparent; border: none; color: var(--muted); font-size: 0.8rem; cursor: pointer; padding: 0; margin-left: 6px; transition: color 0.15s; }
.c-delete:hover { color: var(--rose); }
.no-comments {
  font-family: var(--serif); font-style: italic; font-size: 1rem;
  color: var(--muted); text-align: center; padding: 24px 0;
}

/* Comment form */
.comment-form {
  padding: 16px 20px;
  border-top: 1px solid var(--line);
  background: rgba(6,22,25,0.4);
}
.cf-login {
  font-family: var(--serif); font-style: italic;
  font-size: 1rem; color: var(--muted); text-align: center;
  padding: 8px 0; display: flex; flex-direction: column; gap: 10px; align-items: center;
}
.cf-textarea {
  width: 100%; background: rgba(6,22,25,0.6);
  border: 1px solid var(--line-strong); color: var(--ivory);
  font-family: var(--serif); font-size: 1rem; line-height: 1.55;
  padding: 10px 12px; border-radius: 3px; resize: vertical; min-height: 80px;
  transition: border-color 0.15s;
}
.cf-textarea:focus { outline: none; border-color: var(--rose); }
.cf-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
.cf-hint { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); letter-spacing: 0.08em; }
.cf-submit {
  padding: 8px 18px; background: var(--rose); border: none; color: var(--ink);
  font-family: var(--mono); font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase;
  cursor: pointer; border-radius: 2px; transition: background 0.15s;
}
.cf-submit:hover { background: var(--rose-deep); color: var(--ivory); }
.cf-submit:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── Wiki popup ────────────────────────────────────────── */
.wiki-popup-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(6,22,25,0.7); backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center;
  padding: 20px;
}
.wiki-popup-overlay.open { display: flex; }
.wiki-popup {
  background: var(--ink-2); border: 1px solid var(--line-strong);
  border-radius: 4px; max-width: 560px; width: 100%;
  max-height: 80vh; overflow-y: auto;
  animation: fadeUp 0.2s ease both;
}
.wp-head {
  padding: 20px 24px 14px;
  border-bottom: 1px solid var(--line);
  display: flex; justify-content: space-between; align-items: flex-start;
}
.wp-tag { font-family: var(--mono); font-size: 0.75rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--rose); margin-bottom: 4px; }
.wp-title { font-family: var(--serif); font-size: 1.6rem; color: var(--ivory); }
.wp-role { font-family: var(--mono); font-size: 0.8rem; color: var(--muted); margin-top: 4px; letter-spacing: 0.12em; }
.wp-close { background: transparent; border: none; color: var(--muted); font-size: 1.3rem; cursor: pointer; transition: color 0.15s; padding: 0; }
.wp-close:hover { color: var(--ivory); }
.wp-body { padding: 20px 24px; }
.wp-desc { font-family: var(--serif); font-style: italic; font-size: 1.05rem; color: var(--ivory-2); line-height: 1.7; }
.wp-meta { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 8px; }
.wp-chip {
  font-family: var(--mono); font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase;
  padding: 4px 10px; border: 1px solid var(--line); color: var(--muted); border-radius: 2px;
}
.wp-full-link {
  display: inline-flex; align-items: center; gap: 6px; margin-top: 18px;
  font-family: var(--mono); font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--teal-soft); border-bottom: 1px solid var(--teal);
  transition: color 0.15s;
}
.wp-full-link:hover { color: var(--ivory); }

/* ── Word lookup popup ─────────────────────────────────── */
.lookup-popup {
  position: fixed; z-index: 600;
  background: var(--ink-2); border: 1px solid var(--line-strong);
  border-radius: 4px; padding: 16px 20px;
  max-width: 340px; min-width: 240px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  display: none;
  animation: fadeUp 0.15s ease both;
}
.lookup-popup.open { display: block; }
.lp-word { font-family: var(--serif); font-size: 1.2rem; color: var(--ivory); margin-bottom: 12px; }
.lp-actions { display: flex; flex-direction: column; gap: 8px; }
.lp-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 14px; background: transparent;
  border: 1px solid var(--line); color: var(--muted);
  font-family: var(--mono); font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer; border-radius: 2px; transition: all 0.12s; text-decoration: none;
}
.lp-btn:hover { border-color: var(--rose); color: var(--rose); }

/* ── Narrate hero button ───────────────────────────────── */
.narrate-hero-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 18px;
  border: 1px solid var(--rose);
  background: rgba(233,74,124,0.12);
  color: var(--rose);
  font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.18em;
  text-transform: uppercase; cursor: pointer; border-radius: 2px;
  transition: all 0.2s;
  box-shadow: 0 0 12px rgba(233,74,124,0.2);
}
.narrate-hero-btn:hover {
  background: var(--rose); color: var(--ink);
  box-shadow: 0 0 20px rgba(233,74,124,0.45);
}
.narrate-hero-icon { font-size: 0.8rem; }

/* ── Narration thread sidebar ──────────────────────────── */
.narration-thread {
  position: fixed; right: 0; top: 64px; bottom: 0; z-index: 310;
  width: 340px;
  background: var(--ink-2);
  border-left: 1px solid var(--line-strong);
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.3s ease;
}
.narration-thread.open { transform: none; }
.nt-head {
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
}
.nt-title { font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--teal-bright); }
.nt-close {
  background: transparent; border: none; color: var(--muted);
  font-size: 1.1rem; cursor: pointer; transition: color 0.15s;
}
.nt-close:hover { color: var(--ivory); }
.nt-preview {
  font-family: var(--serif); font-style: italic; font-size: 0.88rem;
  color: var(--muted); padding: 10px 20px 0; line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.nt-comments { flex: 1; overflow-y: auto; padding: 14px 20px; display: flex; flex-direction: column; gap: 12px; }
.nt-comments::-webkit-scrollbar { width: 4px; }
.nt-comments::-webkit-scrollbar-thumb { background: var(--teal); }
.nt-form { padding: 14px 20px; border-top: 1px solid var(--line); background: rgba(6,22,25,0.4); }
.narration-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 300;
  background: rgba(6,22,25,0.97);
  backdrop-filter: blur(12px);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 48px 120px;
}
.narration-overlay.active { display: flex; }

.narration-text {
  max-width: 760px;
  width: 100%;
  font-family: var(--serif);
  font-size: clamp(1.3rem, 2.2vw, 1.75rem);
  line-height: 2;
  letter-spacing: 0.015em;
  color: rgba(244,234,217,0.3);
  text-align: center;
  position: relative;

<script>
// ── Narration state ──────────────────────────────────────
const NARRATE_URL = 'https://sscpikfblqtmcefegrpv.supabase.co/functions/v1/narrate';

let narrationActive    = false;
let narrationParaIds   = [];
let narrationIndex     = 0;
let narrationAudio     = null;
let narrationPlaying   = false;
let narrationAlignment = null;
let narrationRAF       = null;
let narrationCache     = {};
let narrationLocked    = false; // prevents overlapping goTo calls

// ── Ambient music ────────────────────────────────────────
let ambientAudio   = null;
let ambientEnabled = localStorage.getItem('ambientMusic') !== 'off';

function applyAmbientBtn() {
  const btn = document.getElementById('nc-music-btn');
  if (!btn) return;
  btn.textContent = ambientEnabled ? '♪ Music on' : '♪ Music off';
  btn.style.color = ambientEnabled ? 'var(--teal-bright)' : '';
  btn.style.borderColor = ambientEnabled ? 'var(--teal-soft)' : '';
}

function toggleAmbient() {
  ambientEnabled = !ambientEnabled;
  localStorage.setItem('ambientMusic', ambientEnabled ? 'on' : 'off');
  applyAmbientBtn();
  if (ambientEnabled && narrationActive) {
    const pid = narrationParaIds[narrationIndex];
    startAmbient(currentChapter, getSceneForPara(pid));
  } else {
    stopAmbient();
  }
}

function getSceneForPara(pid) {
  const el = document.getElementById(pid);
  if (!el) return 1;
  return parseInt(el.dataset.scene || '1', 10);
}

async function resolveAmbientTrack(chapter, scene) {
  // Try most specific first, fall back to chapter, then default
  const candidates = [
    `assets/audio/chapter-${chapter}-scene-${scene}.mp3`,
    `assets/audio/chapter-${chapter}.mp3`,
    `assets/audio/narration-ambient.mp3`,
  ];
  for (const src of candidates) {
    const ok = await fetch(src, { method: 'HEAD' }).then(r => r.ok).catch(() => false);
    if (ok) return src;
  }
  return null;
}

async function startAmbient(chapter, scene) {
  if (!ambientEnabled) return;

  const src = await resolveAmbientTrack(chapter || currentChapter, scene || 1);
  if (!src) return;

  // If same track already playing, don't restart
  if (ambientAudio && ambientAudio._src === src) return;

  // Cross-fade: fade out old, fade in new
  if (ambientAudio) {
    const old = ambientAudio;
    ambientAudio = null;
    const fadeOut = setInterval(() => {
      old.volume = Math.max(0, old.volume - 0.02);
      if (old.volume <= 0) { old.pause(); clearInterval(fadeOut); }
    }, 60);
  }

  const audio = new Audio(src);
  audio._src  = src;
  audio.loop   = true;
  audio.volume = 0;
  ambientAudio = audio;
  audio.play().catch(() => {});

  let v = 0;
  const fade = setInterval(() => {
    if (ambientAudio !== audio) { clearInterval(fade); return; }
    v = Math.min(0.18, v + 0.01);
    audio.volume = v;
    if (v >= 0.18) clearInterval(fade);
  }, 80);
}

function stopAmbient() {
  if (!ambientAudio) return;
  const audio = ambientAudio;
  ambientAudio = null;
  const fade = setInterval(() => {
    audio.volume = Math.max(0, audio.volume - 0.015);
    if (audio.volume <= 0) { audio.pause(); clearInterval(fade); }
  }, 80);
}

function isEpigraphPara(pid) {
  const el = document.getElementById(pid);
  return el ? !!el.closest('.epigraph-block') : false;
}

function getNarrableParagraphs() {
  // All .para elements in current chapter, in order
  return Array.from(document.querySelectorAll('#chapter-content .para'))
    .map(el => el.dataset.paraId)
    .filter(Boolean);
}

async function startNarration() {
  narrationParaIds = getNarrableParagraphs();
  if (!narrationParaIds.length) return;

  narrationActive  = true;
  narrationIndex   = 0;

  document.getElementById('narration-overlay').classList.add('active');
  document.getElementById('narration-progress').style.display = 'block';
  document.getElementById('narration-controls').style.display = 'flex';
  document.body.style.overflow = 'hidden';
  applyAmbientBtn();

  await narrationGoTo(0);
}

function stopNarration() {
  narrationActive  = false;
  narrationPlaying = false;
  if (narrationAudio) { narrationAudio.pause(); narrationAudio = null; }
  cancelAnimationFrame(narrationRAF);

  document.getElementById('narration-overlay').classList.remove('active');
  document.getElementById('narration-progress').style.display = 'none';
  document.getElementById('narration-controls').style.display = 'none';
  document.getElementById('narration-thread').classList.remove('open');
  narrationThreadOpen = false;
  document.body.style.overflow = '';
  stopAmbient();
  document.getElementById('narration-comment-hint').classList.remove('visible');
}

async function narrationGoTo(index) {
  // Hard-stop any currently playing audio immediately
  if (narrationAudio) {
    narrationAudio.pause();
    narrationAudio = null;
  }
  cancelAnimationFrame(narrationRAF);

  // Lock — prevent re-entry
  if (narrationLocked) return;
  narrationLocked = true;

  narrationIndex = index;
  if (index >= narrationParaIds.length) { narrationLocked = false; stopNarration(); return; }

  const pid = narrationParaIds[index];
  const total = narrationParaIds.length;

  // Counter — chapter · scene · paragraph progress
  const scene = getSceneForPara(pid);
  const chapterNames = { 1:'Assembly', 2:'The Startend', 3:'Doubt and Certainty' };
  const chName = chapterNames[currentChapter] || `Chapter ${currentChapter}`;
  document.getElementById('narration-counter').innerHTML =
    `<span style="color:var(--rose);letter-spacing:0.22em">CH. ${currentChapter}</span>`
    + `<span style="color:var(--line-strong);margin:0 10px">·</span>`
    + `<span style="color:var(--teal-soft)">${chName}</span>`
    + `<span style="color:var(--line-strong);margin:0 10px">·</span>`
    + `<span>Scene ${scene}</span>`
    + `<span style="color:var(--line-strong);margin:0 10px">·</span>`
    + `<span style="color:var(--muted)">${index + 1} / ${narrationParaIds.length}</span>`;

  // Refresh thread sidebar if open
  if (narrationThreadOpen) {
    document.getElementById('nt-preview').textContent = getParaText(narrationParaIds[index] || '').slice(0, 120) + '…';
    if (narrationParaIds[index]) loadNarrationComments(narrationParaIds[index]);
  }

  const prevScene = index > 0 ? getSceneForPara(narrationParaIds[index - 1]) : -1;
  startAmbient(currentChapter, scene);

  // Pause on scene changes — including the very first scene
  if (scene !== prevScene) {
    const textEl = document.getElementById('narration-text');
    textEl.innerHTML = `<span class="narration-loading" style="opacity:0.2">✦</span>`;
    await new Promise(r => setTimeout(r, index === 0 ? 1800 : 2500));
    if (narrationIndex !== index) { narrationLocked = false; return; }
  }

  // Show comment hint if paragraph has threads
  const count = commentCounts[pid] || 0;
  const hint  = document.getElementById('narration-comment-hint');
  document.getElementById('nch-count').textContent = count;
  hint.classList.toggle('visible', count > 0);

  // Get plain text for this paragraph
  const text = getParaText(pid);
  if (!text) { narrationLocked = false; await narrationGoTo(index + 1); return; }

  // Show loading
  const textEl = document.getElementById('narration-text');
  textEl.innerHTML = `<span class="narration-loading">the stone is listening…</span>`;

  // Stop previous audio
  if (narrationAudio) { narrationAudio.pause(); narrationAudio = null; }
  cancelAnimationFrame(narrationRAF);
  narrationPlaying = false;

  // Fetch (or use cache)
  let data = narrationCache[pid];
  if (!data) {
    try {
      const res = await fetch(NARRATE_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${SUPA_KEY}`,
        },
        body: JSON.stringify({ text })
      });
      data = await res.json();
      if (data.error) throw new Error(data.error);
      narrationCache[pid] = data;
    } catch(e) {
      textEl.innerHTML = `<span class="narration-loading">Could not load audio — ${e.message}</span>`;
      narrationLocked = false;
      return;
    }
  }

  narrationAlignment = data.alignment;

  // Build word spans from alignment
  const words = buildWordTimings(text, data.alignment);

  // Parse italic/bold/small-caps ranges from the original text
  // so we can apply them to the karaoke display
  function getMarkupRanges(src) {
    const ranges = [];
    const patterns = [
      { re: /\*\*(.+?)\*\*/g,  cls: 'nw-bold' },
      { re: /~~(.+?)~~/g,      cls: 'nw-smcaps' },
      { re: /\*([^*]+?)\*/g,   cls: 'nw-italic' },
    ];
    // Work on plain text (strip tags) to get char positions
    // We strip markup markers progressively to map to plain positions
    patterns.forEach(({ re, cls }) => {
      let m;
      // Clone and strip already-processed markers to get clean positions
      const stripped = src
        .replace(/\*\*(.+?)\*\*/g, (_, t) => '\x00'.repeat(2) + t + '\x00'.repeat(2))
        .replace(/~~(.+?)~~/g,     (_, t) => '\x00'.repeat(2) + t + '\x00'.repeat(2))
        .replace(/\*([^*]+?)\*/g,  (_, t) => '\x00' + t + '\x00');
      // Find ranges in stripped (marker chars have zero display width concept)
      // Simpler: just find word-level italic by checking if word appears in italic context
    });
    // Simple approach: find italic spans in original text, map their plain-text words
    const italicRe = /\*\*?([^*]+?)\*\*?/g;
    let m;
    while ((m = italicRe.exec(src)) !== null) {
      const isBold = src[m.index + 1] === '*';
      ranges.push({
        words: m[1].trim().toLowerCase().split(/\s+/),
        cls: isBold ? 'nw-bold' : 'nw-italic'
      });
    }
    const smRe = /~~(.+?)~~/g;
    while ((m = smRe.exec(src)) !== null) {
      ranges.push({ words: m[1].trim().toLowerCase().split(/\s+/), cls: 'nw-smcaps' });
    }
    return ranges;
  }

  const markupRanges = getMarkupRanges(text);

  // Tag each word with its formatting class if it appears in a markup range
  // Match by building sliding windows of words
  function tagWords(words, ranges) {
    const tagged = words.map(w => ({ ...w, fmt: '' }));
    ranges.forEach(({ words: mw, cls }) => {
      if (!mw.length) return;
      for (let i = 0; i <= tagged.length - mw.length; i++) {
        const match = mw.every((mword, j) =>
          tagged[i + j].text.toLowerCase().replace(/[^a-z0-9']/g, '') ===
          mword.replace(/[^a-z0-9']/g, '')
        );
        if (match) {
          for (let j = 0; j < mw.length; j++) tagged[i + j].fmt = cls;
        }
      }
    });
    return tagged;
  }

  const taggedWords = tagWords(words, markupRanges);

  textEl.innerHTML = taggedWords.map((w, i) =>
    `<span class="nw ${w.fmt}" id="nw-${i}">${escHtml(w.text)}</span>${w.space ? ' ' : ''}`
  ).join('');

  // Create audio from base64
  const audioBlob = base64ToBlob(data.audio, 'audio/mpeg');
  const audioUrl  = URL.createObjectURL(audioBlob);
  narrationAudio  = new Audio(audioUrl);
  narrationPlaying = true;

  document.getElementById('nc-play-btn').textContent = '⏸ Pause';

  // Prefetch next paragraph quietly
  prefetchNext(index + 1);

  // Start playback + karaoke sync
  narrationLocked = false; // unlock — audio is playing, navigation is safe again
  narrationAudio.play();
  narrationAudio.addEventListener('ended', () => {
    cancelAnimationFrame(narrationRAF);
    setTimeout(() => narrationGoTo(index + 1), 1200);
  });

  function syncWords() {
    if (!narrationAudio || narrationAudio.paused) return;
    const t = narrationAudio.currentTime;

    // Update progress bar
    const pct = narrationAudio.duration ? (t / narrationAudio.duration) * 100 : 0;
    document.getElementById('narration-progress-bar').style.width = pct + '%';

    // Highlight current word
    words.forEach((w, i) => {
      const el = document.getElementById('nw-' + i);
      if (!el) return;
      if (t >= w.end) {
        el.className = 'nw spoken';
      } else if (t >= w.start) {
        el.className = 'nw current';
        // Scroll into view if needed
        el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      } else {
        el.className = 'nw';
      }
    });

    narrationRAF = requestAnimationFrame(syncWords);
  }
  narrationRAF = requestAnimationFrame(syncWords);
}

function narrationTogglePlay() {
  if (!narrationAudio) return;
  if (narrationAudio.paused) {
    narrationAudio.play();
    narrationPlaying = true;
    narrationRAF = requestAnimationFrame(function sync() {
      if (!narrationAudio || narrationAudio.paused) return;
      const t = narrationAudio.currentTime;
      const words = Array.from(document.querySelectorAll('.nw'));
      // re-sync handled inside narrationGoTo's closure — just restart RAF
      narrationRAF = requestAnimationFrame(sync);
    });
    document.getElementById('nc-play-btn').textContent = '⏸ Pause';
  } else {
    narrationAudio.pause();
    narrationPlaying = false;
    cancelAnimationFrame(narrationRAF);
    document.getElementById('nc-play-btn').textContent = '▶ Play';
  }
}

function narrationPrev() {
  if (narrationLocked) return;
  if (narrationIndex > 0) narrationGoTo(narrationIndex - 1);
}

function narrationNext() {
  if (narrationLocked) return;
  narrationGoTo(narrationIndex + 1);
}

async function startNarrationFrom(pid) {
  narrationParaIds = getNarrableParagraphs();
  const idx = narrationParaIds.indexOf(pid);
  narrationIndex = idx >= 0 ? idx : 0;
  narrationActive = true;

  document.getElementById('narration-overlay').classList.add('active');
  document.getElementById('narration-progress').style.display = 'block';
  document.getElementById('narration-controls').style.display = 'flex';
  document.body.style.overflow = 'hidden';
  applyAmbientBtn();

  await narrationGoTo(narrationIndex);
}

let narrationThreadOpen = false;

function narrationToggleThread() {
  narrationThreadOpen = !narrationThreadOpen;

function buildWordTimings(text, alignment) {
  const chars      = alignment.characters || [];
  const startTimes = alignment.character_start_times_seconds || [];
  const endTimes   = alignment.character_end_times_seconds   || [];

  const words = [];
  let word = '', wordStart = 0, wordEnd = 0;
  let inTag = false; // track if we're inside an SSML tag

  for (let i = 0; i < chars.length; i++) {
    const c = chars[i];

    // Skip SSML tags like <speak>, <break time="1.2s"/>
    if (c === '<') { inTag = true; continue; }
    if (c === '>') { inTag = false; continue; }
    if (inTag) continue;

    if (c === ' ' || c === '\n') {
      if (word) {
        words.push({ text: word, start: wordStart, end: wordEnd, space: true });
        word = '';
      }
    } else {
      if (!word) wordStart = startTimes[i] || 0;
      word   += c;
      wordEnd = endTimes[i] || 0;
    }
  }
  if (word) words.push({ text: word, start: wordStart, end: wordEnd, space: false });
  return words;
}

function base64ToBlob(base64, mimeType) {
  const binary = atob(base64);
  const bytes  = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new Blob([bytes], { type: mimeType });
}

async function initAuth() {

  if (!hashSession && window.location.hash.includes('access_token')) {
    const params = new URLSearchParams(window.location.hash.replace(/^#+/, ''));
    const access_token  = params.get('access_token');
    const refresh_token = params.get('refresh_token');
    if (access_token && refresh_token) {

  const { data: { session } } = await db.auth.getSession();

  // Clean the URL without reloading
  if (window.location.hash.includes('access_token')) {

  db.auth.onAuthStateChange(async (_event, session) => {
    currentUser = session?.user ?? null;

function renderChapter(ch) {
  const el = document.getElementById('chapter-content');

  let paraIndex = 0;
  let sceneIndex = 1;
  let prevSecType = null; // track previous section type for scene transitions
  let html = `
    <div class="ch-eyebrow">Chapter ${currentChapter}</div>
    <h1 class="ch-title">${ch.title}</h1>
    <p class="ch-subtitle">${ch.subtitle}</p>`;

  ch.sections.forEach((sec) => {

    // ── Uplink interlude ──
    if (sec.type === 'uplink') {
      sceneIndex++; // uplinks count as scene breaks for audio purposes
      const isTemporalOrientation = (sec.heading || '').toLowerCase().includes('temporal');
      const isAssets = sec.subtype === 'assets';
      const labelHtml = isTemporalOrientation
        ? `<a href="wiki.html?entry=time-system" target="_blank" rel="noopener">${sec.heading}</a>`
        : (sec.heading || 'UPLINK');

      const headingPid  = `ch${currentChapter}-p${paraIndex}`;
      const headingText = sec.heading || 'UPLINK';
      paraIndex++;

      const headingPara = `
        <p class="para uplink-heading-para"
           id="${headingPid}"
           data-para-id="${headingPid}"
           data-comment-count="0"
           data-scene="${sceneIndex}"
           onclick="selectPara('${headingPid}', this)">
          <span class="para-toolbar">
            <button class="pt-btn" onclick="event.stopPropagation();openThread('${headingPid}')">💬 Thread</button>
            <button class="pt-btn pt-narrate" onclick="event.stopPropagation();startNarrationFrom('${headingPid}')">▶ Narrate</button>
          </span>
          ${labelHtml}
        </p>`;

      const parasHtml = sec.paragraphs.map(text => {
        const pid   = `ch${currentChapter}-p${paraIndex}`;
        const count = commentCounts[pid] || 0;
        const linked = autoLink(parseMarkup(text));
        paraIndex++;

        // Level 1 (system): all-caps e.g. **SOL SYSTEM**, **YREUS SYSTEM**, **MAIREE**
        // Level 2 (subset): mixed-case bold-only e.g. **En Route to Mairee**, **In Orbit**
        const trimmed = text.trim();
        const isLevel1 = isAssets && /^\*\*[A-Z][A-Z\s&·]+\*\*$/.test(trimmed);
        const isLevel2 = isAssets && !isLevel1 && /^\*\*[A-Z][a-zA-Z\s'·]+\*\*$/.test(trimmed);

        if (isLevel1) {
          return `<div class="uplink-section-divider uplink-s1" id="${pid}" data-para-id="${pid}" data-comment-count="${count}">${parseMarkup(text)}</div>`;
        }
        if (isLevel2) {
          return `<div class="uplink-section-divider uplink-s2" id="${pid}" data-para-id="${pid}" data-comment-count="${count}">${parseMarkup(text)}</div>`;
        }

        return `
          <p class="para${count > 0 ? ' has-comments' : ''}"
             id="${pid}"
             data-para-id="${pid}"
             data-comment-count="${count}"
             data-scene="${sceneIndex}"
             onclick="selectPara('${pid}', this)">
            <span class="para-toolbar">
              <button class="pt-btn" onclick="event.stopPropagation();lookupSelection('${pid}')">🔍 Look up</button>
              <button class="pt-btn" onclick="event.stopPropagation();openThread('${pid}')">💬 Thread${count > 0 ? ` (${count})` : ''}</button>
              <button class="pt-btn pt-narrate" onclick="event.stopPropagation();startNarrationFrom('${pid}')">▶ Narrate</button>
            </span>
            ${linked}
          </p>`;
      }).join('');

      html += `<div class="uplink-block${isAssets ? ' uplink-assets' : ''}">
        ${headingPara}
        ${parasHtml}
      </div>`;
      prevSecType = 'uplink';
      return;
    }

    // ── Scene break ──
    if (sec.type === 'scene-break') {
      html += `<div class="scene-break"><span>✦</span><span>✦</span><span>✦</span></div>`;
      sceneIndex++;
      prevSecType = 'scene-break';
      return;
    }
    if (sec.type === 'epigraph') {
      const parasHtml = sec.paragraphs.map(text => {
        const pid   = `ch${currentChapter}-p${paraIndex}`;
        const count = commentCounts[pid] || 0;
        const linked = autoLink(parseMarkup(text));
        paraIndex++;
        return `
          <p class="para epigraph-para${count > 0 ? ' has-comments' : ''}"
             id="${pid}"
             data-para-id="${pid}"
             data-comment-count="${count}"
             data-scene="${sceneIndex}"
             onclick="selectPara('${pid}', this)">
            <span class="para-toolbar">
              <button class="pt-btn" onclick="event.stopPropagation();lookupSelection('${pid}')">🔍 Look up</button>
              <button class="pt-btn" onclick="event.stopPropagation();openThread('${pid}')">💬 Thread${count > 0 ? ` (${count})` : ''}</button>
              <button class="pt-btn pt-narrate" onclick="event.stopPropagation();startNarrationFrom('${pid}')">▶ Narrate</button>
            </span>
            ${linked}
          </p>`;
      }).join('');
      html += `<div class="epigraph-block">${parasHtml}</div>`;
      sceneIndex++;
      prevSecType = 'epigraph';
      return;
    }

    // ── Normal section ──
    // If coming from an uplink or epigraph, this is a new scene
    if (prevSecType === 'uplink' || prevSecType === 'epigraph') {
      sceneIndex++;
    }
    prevSecType = 'prose';
    if (sec.heading) {
      const isLocation = sec.heading.includes('·') || /[A-Z]{2,}/.test(sec.heading);
      html += isLocation
        ? `<div class="ch-location-head">${sec.heading}</div>`
        : `<div class="ch-divider"></div><h3 class="ch-section-head">${sec.heading}</h3>`;
    }

    sec.paragraphs.forEach((text, pi) => {
      const pid   = `ch${currentChapter}-p${paraIndex}`;
      const count = commentCounts[pid] || 0;
      const isFirst = paraIndex === 0;
      const linked  = autoLink(parseMarkup(text));
      paraIndex++;
      html += `
        <p class="para${isFirst ? ' drop-cap' : ''}${count > 0 ? ' has-comments' : ''}"
           id="${pid}"
           data-para-id="${pid}"
           data-comment-count="${count}"
           data-scene="${sceneIndex}"
           onclick="selectPara('${pid}', this)">
          <span class="para-toolbar">
            <button class="pt-btn" onclick="event.stopPropagation();lookupSelection('${pid}')">🔍 Look up</button>
            <button class="pt-btn" onclick="event.stopPropagation();openThread('${pid}')">💬 Thread${count > 0 ? ` (${count})` : ''}</button>
              <button class="pt-btn pt-narrate" onclick="event.stopPropagation();startNarrationFrom('${pid}')">▶ Narrate</button>
          </span>
          ${linked}
        </p>`;
    });
  });

  el.innerHTML = html;
  applyFontSize();
}

// ── Markup parser (*italic*, **bold**, ~~small caps~~, \n breaks) ──
function parseMarkup(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/~~(.+?)~~/g, '<span style="font-variant:small-caps;letter-spacing:0.06em">$1</span>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

// ── Auto wiki linking ────────────────────────────────────
function autoLink(text) {
  // Sort by length descending so longer names match first
  const names = Object.keys(wikiIndex).sort((a, b) => b.length - a.length);
  let result  = text;
  const placeholders = [];

  names.forEach(name => {
    if (name.length < 4) return; // skip very short words
    const escaped = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp(`(?<![\\w-])(${escaped})(?![\\w-])`, 'gi');
    result = result.replace(re, (match) => {
      const idx = placeholders.length;
      placeholders.push(`<span class="wiki-link" onclick="event.stopPropagation();openWikiPopup('${encodeURIComponent(name)}')" title="Wiki: ${match}">${match}</span>`);
      return `\x00${idx}\x00`;
    });
  });

  // Restore placeholders
  result = result.replace(/\x00(\d+)\x00/g, (_, i) => placeholders[+i]);
  return result;
}

// ── Wiki popup ───────────────────────────────────────────
function openWikiPopup(encodedName) {
  const name  = decodeURIComponent(encodedName).toLowerCase();
  const entry = wikiIndex[name];
  if (!entry) return;

  const TAG_LABELS = { char:'Character', ship:'Ship', loc:'Location', item:'Item / Tech', ai:'AI', org:'Faction / Org', biology:'Biology', lore:'Lore' };
  const popup = document.getElementById('wiki-popup');
  popup.innerHTML = `
    <div class="wp-head">
      <div>
        <div class="wp-tag">${TAG_LABELS[entry.tag] || entry.tag || 'Entry'}</div>
        <div class="wp-title">${entry.name || entry.title}</div>
        ${entry.role ? `<div class="wp-role">${entry.role}</div>` : ''}
      </div>
      <button class="wp-close" onclick="closeWikiPopup()">✕</button>
    </div>
    <div class="wp-body">
      <p class="wp-desc">${entry.desc || entry.content || ''}</p>
      <div class="wp-meta">
        ${entry.affil ? `<span class="wp-chip">${entry.affil}</span>` : ''}
        ${entry.aliases ? `<span class="wp-chip">aka ${entry.aliases}</span>` : ''}
      </div>
      ${entry.id ? `<a class="wp-full-link" href="wiki.html?entry=${entry.id}" target="_blank">Full entry in wiki →</a>` : ''}
    </div>`;

  document.getElementById('wiki-overlay').classList.add('open');
}

function closeWikiPopup(e) {
  if (e && e.target !== document.getElementById('wiki-overlay')) return;
  document.getElementById('wiki-overlay').classList.remove('open');
}

function getParaText(pid) {
  const el = document.getElementById(pid);
  if (!el) return '';
  // Clone and remove toolbar before reading text
  const clone = el.cloneNode(true);
  const toolbar = clone.querySelector('.para-toolbar');
  if (toolbar) toolbar.remove();
  return clone.innerText.trim();
}
function lookupSelection(pid) {
  const selection = window.getSelection()?.toString().trim();
  const paraText  = getParaText(pid);
  const word = selection || paraText.split(' ')[0] || '';
  if (!word) return;
  showLookupPopup(word, paraText);
}

function showLookupPopup(word, paraText) {
  const popup = document.getElementById('lookup-popup');
  const clean     = word.replace(/[^a-zA-Z0-9\s\-']/g, '');
  const cleanPara = (paraText || clean).trim();
  popup.innerHTML = `
    <div class="lp-word">"${clean}"</div>
    <div class="lp-actions">
      <a class="lp-btn" href="https://www.merriam-webster.com/dictionary/${encodeURIComponent(clean)}" target="_blank" rel="noopener">📖 Merriam-Webster</a>
      <a class="lp-btn" href="https://translate.google.com/?sl=en&text=${encodeURIComponent(cleanPara)}" target="_blank" rel="noopener">🌍 Google Translate — full paragraph</a>
      <a class="lp-btn" href="https://www.deepl.com/translator#en/nl/${encodeURIComponent(cleanPara)}" target="_blank" rel="noopener">🔵 DeepL — full paragraph</a>
      <button class="lp-btn" onclick="closeLookup()">✕ Close</button>
    </div>`;

  popup.style.top  = '50%';
  popup.style.left = '50%';
  popup.style.transform = 'translate(-50%, -50%)';
  popup.classList.add('open');
}

function closeLookup() {
  document.getElementById('lookup-popup').classList.remove('open');
}

// Click outside to close lookup
document.addEventListener('click', (e) => {
  const popup = document.getElementById('lookup-popup');
  if (popup.classList.contains('open') && !popup.contains(e.target)) closeLookup();
});

// Keyboard: Escape closes popups
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeWikiPopup();
    closeLookup();
    closeSidebar();
  }
});

// ── Wiki hints toggle ────────────────────────────────────
let wikiHintsOn = localStorage.getItem('wikiHints') === 'on';

function applyWikiHints() {
  document.body.classList.toggle('wiki-hints-on', wikiHintsOn);
  const btn = document.getElementById('hints-btn');
  if (btn) {
    btn.textContent = wikiHintsOn ? '◈ Hints on' : '◈ Hints';
    btn.style.color = wikiHintsOn ? 'var(--teal-bright, #4a9aaa)' : '';
    btn.style.borderColor = wikiHintsOn ? 'var(--teal-soft)' : '';
  }
}

function toggleWikiHints() {
  wikiHintsOn = !wikiHintsOn;
  localStorage.setItem('wikiHints', wikiHintsOn ? 'on' : 'off');
  applyWikiHints();
}

// ── Font size ────────────────────────────────────────────
const FONT_SIZES = [0.95, 1.05, 1.18, 1.32, 1.48]; // rem steps
let fontSizeIdx = parseInt(localStorage.getItem('readerFontSize') ?? '2', 10);

function applyFontSize() {
  const size = FONT_SIZES[fontSizeIdx];
  document.querySelectorAll('.para').forEach(p => {
    // Uplink paras scale at 72% of prose size to keep visual distinction
    const isUplink = p.closest('.uplink-block');
    p.style.fontSize = (isUplink ? Math.max(0.75, size * 0.72) : size) + 'rem';
  });
}

function changeFontSize(dir) {
  fontSizeIdx = Math.max(0, Math.min(FONT_SIZES.length - 1, fontSizeIdx + dir));
  localStorage.setItem('readerFontSize', fontSizeIdx);
  applyFontSize();
}

// ── Utilities ────────────────────────────────────────────
function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1)  return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h/24)}d ago`;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, duration = 3000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), duration);
}

// ── Init ─────────────────────────────────────────────────
async function init() {
  applyWikiHints();
  await Promise.all([buildWikiIndex(), initAuth()]);
  await loadChapter(1);
}

init();
</script>
