<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Read — The Unfolding: Mairee</title>
<meta name="description" content="An interactive reading experience. Click any paragraph to explore wiki entries, leave threads, and listen to the story narrated with full character voices."/>

<!-- Open Graph -->
<meta property="og:type"        content="book"/>
<meta property="og:site_name"   content="The Unfolding: Mairee"/>
<meta property="og:title"       content="The Unfolding: Mairee — Read"/>
<meta property="og:description" content="An interactive sci-fi novel. Two systems. One severed connection. Read the first chapters — with wiki links, narration, and AI podcast reviews built in."/>
<meta property="og:image"       content="https://the-unfolding.net/assets/still-fold.jpg"/>
<meta property="og:image:width" content="1200"/>
<meta property="og:image:height"content="630"/>
<meta property="og:url"         content="https://the-unfolding.net/reader.html"/>

<!-- Twitter / X -->
<meta name="twitter:card"        content="summary_large_image"/>
<meta name="twitter:title"       content="The Unfolding: Mairee — Read"/>
<meta name="twitter:description" content="An interactive sci-fi novel. Two systems. One severed connection. Read the first chapters free."/>
<meta name="twitter:image"       content="https://the-unfolding.net/assets/still-fold.jpg"/>

<!-- LinkedIn reads og: tags — no extra tags needed -->
<link rel="icon" href="favicon.ico" sizes="any"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="css/reader.css"/>

  <style>
    /* Mobile controls — icon-only below 600px */
    @media (max-width: 600px) {
      .narration-controls {
        gap: 3px !important;
        padding: 6px 3px !important;
      }
      .nc-btn {
        flex: 1 1 0 !important;
        min-width: 0 !important;
        padding: 10px 4px !important;
        font-size: 0.7rem !important;
        letter-spacing: 0 !important;
      }
      .nc-btn .nc-lbl { display: none !important; }
      .nc-btn .nc-icon { font-size: 1rem; }
    }
  </style>
</head>
<body class="grain">

<!-- ── CHAPTER BAR ──────────────────────────────────────── -->
<header class="chapter-bar">
  <div class="chapter-bar-left">
    <a href="index.html" class="cb-logo"><span class="dot"></span> THE UNFOLDING</a>
    <div class="chapter-pills" id="chapter-pills"></div>
  </div>
  <div class="chapter-bar-right">
    <div class="font-size-controls">
      <button class="fs-btn" onclick="changeFontSize(-1)" title="Decrease font size">A−</button>
      <button class="fs-btn" onclick="changeFontSize(+1)" title="Increase font size">A+</button>
    </div>
    <a href="map.html" target="unfolding-map" rel="noopener" class="fs-btn" style="text-decoration:none" title="Open tactical map">◉ Map</a>
    <button class="narrate-hero-btn" onclick="startNarration()" id="narrate-btn" title="Listen to Charlotte narrate the story">
      <span class="narrate-hero-icon">▶</span> Narrate
    </button>
    <div id="auth-area" style="display:flex;align-items:center;gap:10px;"></div>
  </div>
</header>

<!-- ── READER ───────────────────────────────────────────── -->
<div class="reader-wrap">

  <!-- Main text -->
  <main class="reader-main">
    <div class="chapter-content" id="chapter-content">
      <div style="display:flex;align-items:center;justify-content:center;height:50vh;font-family:var(--serif);font-style:italic;color:var(--muted)">
        Loading…
      </div>
    </div>
  </main>

  <!-- Sidebar -->
  <aside class="reader-sidebar" id="reader-sidebar">
    <div class="sb-empty" id="sb-empty">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span>Click any paragraph<br/>to read or leave a thread</span>
    </div>
    <div class="sb-panel" id="sb-panel">
      <div class="sb-head">
        <div class="sb-head-left">
          <div class="mono-label" style="font-size:0.72rem">Thread</div>
          <div class="sb-para-preview" id="sb-para-preview"></div>
        </div>
        <button class="sb-close" onclick="closeSidebar()">✕</button>
      </div>
      <div class="comments-list" id="comments-list"></div>
      <div class="comment-form" id="comment-form"></div>
    </div>
  </aside>
</div>

<!-- ── WIKI POPUP ───────────────────────────────────────── -->
<div class="wiki-popup-overlay" id="wiki-overlay" onclick="closeWikiPopup(event)">
  <div class="wiki-popup" id="wiki-popup"></div>
</div>

<!-- ── WORD LOOKUP POPUP ────────────────────────────────── -->
<div class="lookup-popup" id="lookup-popup"></div>

<!-- ── TOAST ────────────────────────────────────────────── -->
<div class="toast hidden" id="toast"></div>

<!-- ── PODCAST FAB ───────────────────────────────────────── -->
<button class="podcast-fab" id="podcast-fab" onclick="openPodcastPanel()">
  <span class="podcast-fab-icon">🎙</span>
  <span class="podcast-fab-label">
    <span class="podcast-fab-title">Decoded</span>
    <span class="podcast-fab-sub">CIX Vera &amp; Milo review this chapter</span>
  </span>
</button>

<!-- ── PODCAST PANEL ─────────────────────────────────────── -->
<div class="podcast-panel" id="podcast-panel">
  <div class="podcast-panel-head">
    <div class="pp-title">🎙 The Unfolding · Decoded</div>
    <button class="pp-close" onclick="closePodcastPanel()">✕</button>
  </div>
  <iframe class="podcast-iframe" id="podcast-iframe" src="about:blank"></iframe>
</div>

<!-- ── NARRATION OVERLAY ─────────────────────────────────── -->
<div class="narration-overlay" id="narration-overlay">
  <div class="narration-counter" id="narration-counter"></div>
  <div class="narration-text" id="narration-text">
    <span class="narration-loading" id="narration-loading">Preparing narration…</span>
  </div>
  <div class="narration-comment-hint" id="narration-comment-hint">
    <div class="nch-count" id="nch-count">0</div>
    <div class="nch-label">threads</div>
    <button class="nch-btn" onclick="narrationToggleThread()">💬 Thread</button>
  </div>
</div>

<div class="narration-progress" id="narration-progress" style="display:none">
  <div class="narration-progress-bar" id="narration-progress-bar"></div>
</div>

<div class="narration-controls" id="narration-controls" style="display:none">
  <button class="nc-btn" onclick="narrationPrev()"><span class="nc-icon">←</span><span class="nc-lbl"> Prev</span></button>
  <button class="nc-btn primary" id="nc-play-btn" onclick="narrationTogglePlay()"><span class="nc-icon">⏸</span><span class="nc-lbl"> Pause</span></button>
  <button class="nc-btn" onclick="narrationNext()"><span class="nc-icon">→</span><span class="nc-lbl"> Next</span></button>
  <button class="nc-btn" id="nc-thread-btn" onclick="narrationToggleThread()"><span class="nc-icon">💬</span><span class="nc-lbl"> Thread</span></button>
  <button class="nc-btn" id="nc-voices-btn" onclick="toggleMultiVoice()" title="Switch between narrator and character voices"><span class="nc-icon">◎</span><span class="nc-lbl"> Narrator</span></button>
  <button class="nc-btn" id="nc-music-btn" onclick="toggleAmbient()" title="Toggle background music"><span class="nc-icon">♪</span><span class="nc-lbl"> Music</span></button>
  <button class="nc-btn" onclick="stopNarration()"><span class="nc-icon">✕</span><span class="nc-lbl"> Exit</span></button>
</div>

<!-- ── NARRATION THREAD SIDEBAR ──────────────────────────── -->
<aside class="narration-thread" id="narration-thread">
  <div class="nt-head">
    <span class="nt-title">💬 Thread</span>
    <button class="nt-close" onclick="narrationToggleThread()">✕</button>
  </div>
  <div class="nt-preview" id="nt-preview"></div>
  <div class="nt-comments" id="nt-comments"></div>
  <div class="nt-form" id="nt-form"></div>
</aside>

<script src="js/reader.js"></script>
  <div id="version-badge" style="position:fixed;bottom:4px;right:6px;font-family:monospace;font-size:9px;color:rgba(255,255,255,0.18);pointer-events:none;z-index:9999;letter-spacing:0.05em"></div>
  <script>document.getElementById('version-badge').textContent = typeof READER_VERSION !== 'undefined' ? READER_VERSION : '';</script>
</body>
</html>
