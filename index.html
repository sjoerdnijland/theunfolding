<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="grain" id="top">
  <div id="root"></div>

  <script type="text/babel" src="src/Nav.jsx"></script>
  <script type="text/babel" src="src/Hero.jsx"></script>
  <script type="text/babel" src="src/Synopsis.jsx"></script>
  <script type="text/babel" src="src/Buy.jsx"></script>
  <script type="text/babel" src="src/Excerpt.jsx"></script>
  <script type="text/babel" src="src/CodexInvite.jsx"></script>
  <script type="text/babel" src="src/Portal.jsx"></script>
  <script type="text/babel" src="src/Author.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect } = React;

    const ACCENTS = {
      rose:    { main: '#e94a7c', deep: '#c72f63', soft: '#f39bb4' },
      teal:    { main: '#3b7682', deep: '#255761', soft: '#88c3cd' },
      saffron: { main: '#f4ce74', deep: '#d8a738', soft: '#fbe4b2' },
      violet:  { main: '#c4a6ff', deep: '#9b7ae0', soft: '#e3d1ff' },
    };
    const FONTS = {
      cormorant: "'Cormorant Garamond', Georgia, serif",
      playfair:  "'Playfair Display', Georgia, serif",
      spectral:  "'Spectral', Georgia, serif",
    };

    function App() {
      const [tweaksOn, setTweaksOn] = useState(false);
      const [values, setValues] = useState(window.TWEAK_DEFAULTS);

      useEffect(() => {
        function onMsg(e) {
          const d = e.data;
          if (!d || !d.type) return;
          if (d.type === '__activate_edit_mode') setTweaksOn(true);
          if (d.type === '__deactivate_edit_mode') setTweaksOn(false);
        }
        window.addEventListener('message', onMsg);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', onMsg);
      }, []);

      useEffect(() => {
        const a = ACCENTS[values.accent] || ACCENTS.rose;
        const r = document.documentElement;
        r.style.setProperty('--rose', a.main);
        r.style.setProperty('--rose-deep', a.deep);
        r.style.setProperty('--rose-soft', a.soft);
        r.style.setProperty('--serif', FONTS[values.serifFont] || FONTS.cormorant);
        const grainOpacity = (values.grainIntensity || 8) / 100;
        let s = document.getElementById('grain-intensity-style');
        if (!s) { s = document.createElement('style'); s.id = 'grain-intensity-style'; document.head.appendChild(s); }
        s.textContent = `.grain::before { opacity: ${grainOpacity} !important; }`;
      }, [values]);

      function update(edits) {
        setValues(v => {
          const nv = { ...v, ...edits };
          window.parent.postMessage({ type: '__edit_mode_set_keys', edits: nv }, '*');
          return nv;
        });
      }

      const onBuy = () => { document.getElementById('buy')?.scrollIntoView({ behavior: 'smooth', block: 'start' }); };

      return (
        <>
          <Nav />
          <Hero onBuy={onBuy} />
          <Synopsis />
          <Buy />
          <Excerpt />
          <CodexInvite />
          <Author />
          <SiteFooter />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
